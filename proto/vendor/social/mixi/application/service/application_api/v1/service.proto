syntax = "proto3";

package social.mixi.application.service.application_api.v1;

import "social/mixi/application/const/v1/language_code.proto";
import "social/mixi/application/const/v1/post_publishing_type.proto";
import "social/mixi/application/model/v1/message.proto";
import "social/mixi/application/model/v1/post.proto";
import "social/mixi/application/model/v1/stamp.proto";
import "social/mixi/application/model/v1/user.proto";

// ユーザー情報取得リクエストです。
message GetUsersRequest {
  // 取得対象のユーザーIDを指定してください。
  repeated string user_id_list = 1;
}

// ユーザー情報取得レスポンスです。
message GetUsersResponse {
  // ユーザー情報の一覧です。
  repeated model.v1.User users = 1;
}

// ポスト情報取得リクエストです。
message GetPostsRequest {
  // 取得対象のポストIDを指定してください。
  repeated string post_id_list = 1;
}

// ポスト情報取得レスポンスです。
message GetPostsResponse {
  // ポスト情報の一覧です。
  repeated model.v1.Post posts = 1;
}

// メディアアップロード開始リクエストです。
message InitiatePostMediaUploadRequest {
  // アップロードするデータのContent-Typeを指定してください。
  string content_type = 1;
  // アップロードするデータサイズ（バイト）を指定してください。
  uint64 data_size = 2;
  // メディア種別を指定してください。
  Type media_type = 3;
  // メディアの説明を指定してください（任意）。
  optional string description = 4;

  // アップロードするメディアの種別を指定してください。
  enum Type {
    // 未指定
    TYPE_UNSPECIFIED = 0;
    // 画像
    TYPE_IMAGE = 1;
    // 動画
    TYPE_VIDEO = 2;
  }
}

// メディアアップロード開始レスポンスです。
message InitiatePostMediaUploadResponse {
  // アップロード状況確認や、ポスト/メッセージに送信時にメディアを添付するためのIDです。
  string media_id = 1;
  // メディアデータをアップロードするためのURLです。
  string upload_url = 2;
}

// メディアアップロード状況取得リクエストです。
message GetPostMediaStatusRequest {
  // アップロード状況を確認する対象のメディアIDを指定してください。
  string media_id = 1;
}

// メディアアップロード状況取得レスポンスです。
message GetPostMediaStatusResponse {
  // メディアのアップロード/処理状況です。
  Status status = 1;

  // メディアのアップロード/処理状況を表します。
  enum Status {
    // 未指定
    STATUS_UNSPECIFIED = 0;
    // アップロード待機中
    STATUS_UPLOAD_PENDING = 1;
    // 処理中
    STATUS_PROCESSING = 2;
    // 完了
    STATUS_COMPLETED = 3;
    // 失敗
    STATUS_FAILED = 4;
  }
}

// in_reply_to_post_id と quoted_post_id は同時に指定できません。
message CreatePostRequest {
  // ポストの本文を指定してください。
  string text = 1;
  // 返信先ポストIDを指定してください（任意）。
  optional string in_reply_to_post_id = 2;
  // 引用対象ポストIDを指定してください（任意）。
  optional string quoted_post_id = 3;
  // 添付するメディアID一覧を指定してください（最大4件）。
  repeated string media_id_list = 5;
  // ポストに適用するマスクを指定してください（任意）。
  optional model.v1.PostMask post_mask = 6;
  // ポストの配信設定を指定してください。
  optional const.v1.PostPublishingType publishing_type = 7;
}

// ポスト作成レスポンスです。
message CreatePostResponse {
  // 作成されたポスト情報です。
  model.v1.Post post = 1;
}

// text または media_id のいずれかは必須です。
message SendChatMessageRequest {
  // 送信先ルームIDを指定してください。
  string room_id = 1;
  // 送信するテキストを指定してください（任意）。
  optional string text = 2;
  // 添付するメディアIDを指定してください（任意）。
  optional string media_id = 3;
}

// チャットメッセージ送信レスポンスです。
message SendChatMessageResponse {
  // 送信されたメッセージです。
  model.v1.ChatMessage message = 1;
}

// スタンプ一覧取得リクエストです。
message GetStampsRequest {
  // 取得する公式スタンプの言語を指定してください（任意）。
  // 未指定の場合、公式スタンプ一覧は空で返されます。
  optional const.v1.LanguageCode official_stamp_language = 1;
}

// スタンプ一覧取得レスポンスです。
message GetStampsResponse {
  // 指定言語の公式スタンプセット一覧です。
  repeated model.v1.OfficialStampSet official_stamp_sets = 1;
}

// ポストへのスタンプ付与リクエストです。
message AddStampToPostRequest {
  // スタンプを付与する対象のポストIDを指定してください。指定可能なポストIDは次の通りです。
  // - アプリケーションにメンションしているポストID
  string post_id = 1;
  // 付与するスタンプIDを指定してください。指定可能なスタンプIDは次の通りです。
  // - 公式スタンプID
  string stamp_id = 2;
}

// ポストへのスタンプ付与レスポンスです。
message AddStampToPostResponse {
  // 更新されたポストです。
  model.v1.Post post = 1;
}

// mixi2 アプリケーションサービスです。
service ApplicationService {
  // 指定したユーザーIDリストに対応するユーザー情報を取得します。
  rpc GetUsers(GetUsersRequest) returns (GetUsersResponse);

  // 指定したポストIDリストに対応するポスト情報を取得します。
  rpc GetPosts(GetPostsRequest) returns (GetPostsResponse);

  // ポストを作成します（返信/引用/メディア添付等に対応）。
  rpc CreatePost(CreatePostRequest) returns (CreatePostResponse);

  // ポストやメッセージ（ルーム送信/DM）に添付するメディアのアップロードを開始し、アップロード先URLを発行します。
  rpc InitiatePostMediaUpload(InitiatePostMediaUploadRequest) returns (InitiatePostMediaUploadResponse);

  // 指定したメディアIDのアップロード/処理状況を取得します。
  rpc GetPostMediaStatus(GetPostMediaStatusRequest) returns (GetPostMediaStatusResponse);

  // 指定したルームにチャットメッセージを送信します（テキスト/メディア添付）。
  rpc SendChatMessage(SendChatMessageRequest) returns (SendChatMessageResponse);

  // スタンプ一覧を取得します。
  rpc GetStamps(GetStampsRequest) returns (GetStampsResponse);

  // 指定したポストにスタンプを付与します。
  rpc AddStampToPost(AddStampToPostRequest) returns (AddStampToPostResponse);
}
